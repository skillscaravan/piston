services:
    api:
        build: api
        container_name: piston_api
        privileged: true
        restart: always
        ports:
            - 2000:2000
        volumes:
            - ./data/piston/packages:/piston/packages
            # Bind-mount src/ so JS edits are reflected without rebuilding the image.
            # Restart the container after edits: `docker restart piston_api`.
            - ./api/src:/piston_api/src
        env_file:
            - .env
        environment:
            # Dev-specific; overrides anything in .env.
            - PISTON_REPO_URL=http://repo:8000/index

    repo: # Local testing of packages
        build: repo
        container_name: piston_repo
        command: ['--no-build'] # Don't build anything
        volumes:
            - .:/piston
